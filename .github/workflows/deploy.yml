name: Deploy Main Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: saas-dashboard/package-lock.json
      - name: Install dependencies (Root)
        run: npm ci
      - name: Build Main Site
        run: npm run build
      - name: Install dependencies (Dashboard)
        run: cd saas-dashboard && npm ci
      - name: Build Dashboard
        run: cd saas-dashboard && npm run build
      - name: Merge Dashboard into Dist
        run: mv saas-dashboard/out dist/dashboard
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
